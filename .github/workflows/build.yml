name: Build Example Apps

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.0.0)'
        required: true
        default: 'v0.1.0'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example:
          - name: claude_theme_demo
            label: Claude Theme Demo
          - name: velora_starter
            label: Velora Starter
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: examples/${{ matrix.example.name }}
        run: flutter pub get

      - name: Build APK
        working-directory: examples/${{ matrix.example.name }}
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.example.name }}-apk
          path: examples/${{ matrix.example.name }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-web:
    name: Build Web Apps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example:
          - name: claude_theme_demo
            label: Claude Theme Demo
          - name: velora_starter
            label: Velora Starter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: examples/${{ matrix.example.name }}
        run: flutter pub get

      - name: Build web
        working-directory: examples/${{ matrix.example.name }}
        run: flutter build web --release --base-href /${{ matrix.example.name }}/

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.example.name }}-web
          path: examples/${{ matrix.example.name }}/build/web
          retention-days: 30

  release:
    name: Create Release
    if: github.event_name == 'workflow_dispatch'
    needs: [build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          pattern: '*-apk'
          path: artifacts

      - name: Rename APKs
        run: |
          mv artifacts/claude_theme_demo-apk/app-release.apk artifacts/claude-theme-demo.apk
          mv artifacts/velora_starter-apk/app-release.apk artifacts/velora-starter.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          generate_release_notes: true
          files: |
            artifacts/claude-theme-demo.apk
            artifacts/velora-starter.apk
