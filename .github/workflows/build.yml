name: Build Example Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: examples/claude_clone
        run: flutter pub get

      - name: Build APK
        working-directory: examples/claude_clone
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: claude-clone-apk
          path: examples/claude_clone/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: examples/claude_clone
        run: flutter pub get

      - name: Build web
        working-directory: examples/claude_clone
        run: flutter build web --release --base-href /claude_clone/

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: claude-clone-web
          path: examples/claude_clone/build/web
          retention-days: 30

  release:
    name: Create Release
    if: github.event_name == 'workflow_dispatch'
    needs: [build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' packages/velora/pubspec.yaml | awk '{print $2}' | tr -d '\r')
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if tag exists
        if: steps.tag_check.outputs.exists == 'true'
        run: |
          echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping release."
          exit 0

      - name: Download APK
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: claude-clone-apk
          path: artifacts

      - name: Rename APK
        if: steps.tag_check.outputs.exists == 'false'
        run: mv artifacts/app-release.apk artifacts/claude-clone.apk

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: artifacts/claude-clone.apk
