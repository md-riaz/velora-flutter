name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies (velora_lints)
        working-directory: packages/velora_lints
        run: dart pub get

      - name: Analyze velora_lints
        working-directory: packages/velora_lints
        run: dart analyze

      - name: Install dependencies (velora)
        working-directory: packages/velora
        run: flutter pub get

      - name: Analyze velora package
        working-directory: packages/velora
        run: flutter analyze --no-fatal-infos

      - name: Lint velora package
        working-directory: packages/velora
        run: dart run custom_lint --no-fatal-warnings

      - name: Run velora tests
        working-directory: packages/velora
        run: |
          if [ -d "test" ] && find test -name '*_test.dart' -print -quit | grep -q .; then
            flutter test --coverage
          else
            echo "No test files found — skipping"
          fi

      - name: Install dependencies (velora_offline)
        working-directory: packages/velora_offline
        run: flutter pub get

      - name: Ensure libsqlite3 is available for velora_offline & velora_db tests
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0 libsqlite3-dev

      - name: Analyze velora_offline package
        working-directory: packages/velora_offline
        run: flutter analyze --no-fatal-infos

      - name: Run velora_offline tests
        working-directory: packages/velora_offline
        run: |
          if [ -d "test" ] && find test -name '*_test.dart' -print -quit | grep -q .; then
            flutter test --coverage
          else
            echo "No test files found — skipping"
          fi

      - name: Install dependencies (velora_db)
        working-directory: packages/velora_db
        run: flutter pub get

      - name: Analyze velora_db package
        working-directory: packages/velora_db
        run: flutter analyze --no-fatal-infos

      - name: Run velora_db tests
        working-directory: packages/velora_db
        run: |
          if [ -d "test" ] && find test -name '*_test.dart' -print -quit | grep -q .; then
            flutter test --coverage
          else
            echo "No test files found — skipping"
          fi

      - name: Install dependencies (velora_fcm)
        working-directory: packages/velora_fcm
        run: flutter pub get

      - name: Analyze velora_fcm package
        working-directory: packages/velora_fcm
        run: flutter analyze --no-fatal-infos

      - name: Run velora_fcm tests
        working-directory: packages/velora_fcm
        run: |
          if [ -d "test" ] && find test -name '*_test.dart' -print -quit | grep -q .; then
            flutter test --coverage
          else
            echo "No test files found — skipping"
          fi

      - name: Install dependencies (velora_local_notifications)
        working-directory: packages/velora_local_notifications
        run: flutter pub get

      - name: Analyze velora_local_notifications package
        working-directory: packages/velora_local_notifications
        run: flutter analyze --no-fatal-infos

      - name: Run velora_local_notifications tests
        working-directory: packages/velora_local_notifications
        run: |
          if [ -d "test" ] && find test -name '*_test.dart' -print -quit | grep -q .; then
            flutter test --coverage
          else
            echo "No test files found — skipping"
          fi

      - name: Install dependencies (velora_env)
        working-directory: packages/velora_env
        run: flutter pub get

      - name: Analyze velora_env package
        working-directory: packages/velora_env
        run: flutter analyze --no-fatal-infos

      - name: Run velora_env tests
        working-directory: packages/velora_env
        run: |
          if [ -d "test" ] && find test -name '*_test.dart' -print -quit | grep -q .; then
            flutter test --coverage
          else
            echo "No test files found — skipping"
          fi

      - name: Install dependencies (claude_clone)
        working-directory: examples/claude_clone
        run: flutter pub get

      - name: Analyze claude_clone
        working-directory: examples/claude_clone
        run: flutter analyze --no-fatal-infos

      - name: Lint claude_clone
        working-directory: examples/claude_clone
        run: dart run custom_lint --no-fatal-warnings

      - name: Install dependencies (velora_chat)
        working-directory: examples/velora_chat
        run: flutter pub get

      - name: Analyze velora_chat
        working-directory: examples/velora_chat
        run: flutter analyze --no-fatal-infos

      - name: Lint velora_chat
        working-directory: examples/velora_chat
        run: dart run custom_lint --no-fatal-warnings

      - name: Run velora_chat tests
        working-directory: examples/velora_chat
        run: |
          if [ -d "test" ] && find test -name '*_test.dart' -print -quit | grep -q .; then
            flutter test --coverage
          else
            echo "No test files found — skipping"
          fi

