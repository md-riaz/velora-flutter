name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'packages/velora/lib/**'
      - 'packages/velora/pubspec.yaml'
      - 'examples/*/lib/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'overrides/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install MkDocs toolchain
        run: pip install "mkdocs==1.6.1" "mkdocs-material==9.5.49"

      - name: Build docs site
        run: mkdocs build

      - name: Install dependencies
        working-directory: packages/velora
        run: flutter pub get

      - name: Generate API docs
        working-directory: packages/velora
        run: dart doc --output=../../_site/api

      - name: Download web demo artifacts
        id: demo-check
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          name: claude-clone-web
          path: _site/demo
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Fix demo base href for Pages
        if: steps.demo-check.outcome == 'success'
        run: sed -i 's|<base href="/claude_clone/">|<base href="/velora-flutter/demo/">|' _site/demo/index.html

      - name: Copy landing page
        run: cp docs/index.html _site/index.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
