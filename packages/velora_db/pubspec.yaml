name: velora_db
description: Cross-platform reactive local database (drift + Eloquent-style API) for Velora apps.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.11.1
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  velora:
    path: ../velora
  dio: ^5.9.0
  get: ^4.7.2
  drift: ^2.34.2
  sqlite3: ^3.4.0
  path: ^1.9.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:

# A real app depending on velora_db does NOT need this block at all:
# `package:sqlite3` (which drift's native executor depends on) bundles its
# own native SQLite by default via a Dart/Flutter build hook, no config
# required. This block exists only because this repo's build environments
# (sandbox/CI) block that hook's download, and we want every build here --
# sandbox, CI, and real device/desktop builds alike -- to be reproducible
# and work fully offline. It points the hook at a vendored copy of the
# official SQLite amalgamation (see `third_party/sqlite3/README.md`) and
# tells it to compile that source directly instead of downloading a
# prebuilt binary.
#
# `hooks.user_defines` is read from the pubspec.yaml of whichever package is
# *root* for the build (see `package:hooks_runner`'s
# `UserDefines.workspacePubspec`), never from a dependency's pubspec. So this
# block only takes effect when velora_db itself is root -- i.e. its own
# tests -- and is invisible to a consuming app's build/test, which reads its
# own pubspec's `hooks` section instead (empty by default, and correctly so
# -- see above). On real devices/desktop builds, `sqlite3` 3.x's own build
# hook (see `dependencies:` above) would otherwise bundle the native SQLite
# binary automatically -- no separate `sqlite3_flutter_libs` plugin needed
# (that package is now end-of-life -- see docs/packages/db.md's
# Cross-platform section).
hooks:
  user_defines:
    sqlite3:
      source: source
      path: ../../third_party/sqlite3/sqlite3.c
