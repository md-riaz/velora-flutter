name: velora_offline
description: Connectivity awareness and an offline request queue for Velora apps.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.11.1
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  velora:
    path: ../velora
  velora_db:
    path: ../velora_db
  connectivity_plus: ^6.0.0
  dio: ^5.9.0
  get: ^4.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.3
  drift: ^2.34.2
  sqlite3: ^3.4.0

flutter:

# `package:sqlite3` (which drift's native executor depends on) bundles its
# own SQLite by default via a Dart/Flutter build hook that downloads a
# prebuilt binary from GitHub releases -- a host that isn't reachable in
# every sandboxed/offline CI environment. This mirrors the exact issue the
# old sqflite_common_ffi pin (see git history) worked around by pinning to a
# pre-hook version; here we instead tell the hook to `dlopen("libsqlite3.so")`
# from the operating system, which is virtually always present and avoids
# any network access at build time. See:
# https://pub.dev/packages/sqlite3 -> doc/hook.md ("System-provided SQLite").
#
# This exists ONLY for velora_offline's own host-side `flutter test` / CI:
# those runs happen off-device, with no Flutter engine, so there's no bundled
# native binary in the picture at all -- the hook needs a network-free
# fallback to `dlopen` -- the OS's system libsqlite3. velora_offline now
# transitively depends on `sqlite3` via velora_db (its reactive store
# engine), so it needs the same fallback velora_db's own pubspec declares.
#
# It does NOT propagate to apps that depend on velora_offline: `hooks.user_defines`
# is read from the pubspec.yaml of whichever package is *root* for the build
# (see `package:hooks_runner`'s `UserDefines.workspacePubspec`: "The
# pubspec.yaml of the pub workspace. User-defines are read from this file."),
# never from a dependency's pubspec. So this block only takes effect when
# velora_offline itself is root -- i.e. its own tests -- and is invisible to a
# consuming app's build/test, which reads its own pubspec's `hooks` section
# instead (empty by default). On real devices/desktop builds, `sqlite3` 3.x's
# own build hook (see `dependencies:` above, via velora_db) bundles the
# native SQLite binary automatically -- no separate `sqlite3_flutter_libs`
# plugin needed (that package is now end-of-life -- see docs/packages/db.md's
# Cross-platform section).
hooks:
  user_defines:
    sqlite3:
      source: system
