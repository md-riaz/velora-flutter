name: velora_offline
description: Connectivity awareness and an offline request queue for Velora apps.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.11.1
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  velora:
    path: ../velora
  velora_db:
    path: ../velora_db
  connectivity_plus: ^6.0.0
  dio: ^5.9.0
  get: ^4.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.3
  drift: ^2.34.2
  sqlite3: ^3.4.0

flutter:

# A real app depending on velora_offline does NOT need this block at all:
# `package:sqlite3` (which drift's native executor depends on, transitively
# via velora_db) bundles its own native SQLite by default via a Dart/Flutter
# build hook, no config required. This block exists only because this
# repo's build environments (sandbox/CI) block that hook's download, and we
# want every build here -- sandbox, CI, and real device/desktop builds alike
# -- to be reproducible and work fully offline. It points the hook at a
# vendored copy of the official SQLite amalgamation (see
# `third_party/sqlite3/README.md`) and tells it to compile that source
# directly instead of downloading a prebuilt binary. velora_offline needs
# this for its own tests for the same reason velora_db's own pubspec
# declares it, since velora_offline transitively depends on `sqlite3` via
# velora_db (its reactive store engine).
#
# `hooks.user_defines` is read from the pubspec.yaml of whichever package is
# *root* for the build (see `package:hooks_runner`'s
# `UserDefines.workspacePubspec`), never from a dependency's pubspec. So this
# block only takes effect when velora_offline itself is root -- i.e. its own
# tests -- and is invisible to a consuming app's build/test, which reads its
# own pubspec's `hooks` section instead (empty by default, and correctly so
# -- see above). On real devices/desktop builds, `sqlite3` 3.x's own build
# hook (see `dependencies:` above, via velora_db) would otherwise bundle the
# native SQLite binary automatically -- no separate `sqlite3_flutter_libs`
# plugin needed (that package is now end-of-life -- see docs/packages/db.md's
# Cross-platform section).
hooks:
  user_defines:
    sqlite3:
      source: source
      path: ../../third_party/sqlite3/sqlite3.c
