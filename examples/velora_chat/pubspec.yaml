name: velora_chat
description: WhatsApp-style offline-first messaging demo — shows velora_db (reactive local DB) + velora_offline (offline-first repository, write outbox, connectivity) wired together, with PWA support.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.2
  uuid: ^4.5.1
  dio: ^5.9.0
  velora:
    path: ../../packages/velora
  velora_db:
    path: ../../packages/velora_db
  velora_offline:
    path: ../../packages/velora_offline

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  custom_lint: ^0.6.0
  velora_lints:
    path: ../../packages/velora_lints
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.3
  drift: ^2.34.2

flutter:
  uses-material-design: true

# WARNING: this is a repo-CI/host-test-only workaround. Do NOT copy this
# block into a real app's pubspec.yaml.
#
# A real app depending on velora_db/velora_offline does NOT need this block
# at all: `package:sqlite3` (which drift's native executor depends on,
# transitively via velora_db) bundles its own native SQLite by default via a
# Dart/Flutter build hook, no config required. This block exists only
# because this repo's build environments (sandbox/CI) block that hook's
# download, and we want every build here -- sandbox, CI, and real
# device/desktop builds alike -- to be reproducible and work fully offline.
# It points the hook at a vendored copy of the official SQLite amalgamation
# (see `third_party/sqlite3/README.md`) and tells it to compile that source
# directly instead of downloading a prebuilt binary.
#
# `hooks.user_defines` is only read from the pubspec.yaml of whichever
# package is *root* for the build, so this block only takes effect for
# velora_chat's own tests -- it never affects velora_db or any other
# dependency's build. Real device/desktop builds of velora_chat itself would
# still hit this block since velora_chat is the app being built, which is
# why vendoring keeps even those builds offline/deterministic here.
hooks:
  user_defines:
    sqlite3:
      source: source
      path: ../../third_party/sqlite3/sqlite3.c
